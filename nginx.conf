events {}

http {

	server {
		listen 80; 

		server_name clinica.devroma.online;
			
		location / {
			proxy_pass http://frontend:80;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr; 
		} 
		
		location /api {
			proxy_pass http://api:8080; 
			proxy_set_header Host $host; 
			proxy_set_header X-Real-IP $remote_addr; 
		}
	}

}
